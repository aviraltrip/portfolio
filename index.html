<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aviral Tripathi</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "dark" || !stored) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
            document.documentElement.style.backgroundColor = "hsl(222 47% 4%)";
          } else {
            document.documentElement.style.colorScheme = "light";
            document.documentElement.style.backgroundColor = "hsl(220 20% 97%)";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
